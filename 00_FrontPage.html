<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olivia's Web Design</title>
      <link rel="stylesheet" href="00_WebCSS.css">
</head>
<body>
    <!-- 時鐘列 -->
    <div id="clock"></div>
  
    <!-- 首頁區 -->
    <div class="headbk01">
     <header>Welcome to my Portfolio !</header>
     <hr class="headline01"/>
    </div>

    <!-- 主要內容區 -->
    <div class="bodybk01">
     
      <!-- 第一區塊：個人作品、能力、證照 -->
      <section class="bodyarea01">
       
         <!-- 卡片1:Portfolio -->
         <div class="card-item">
          <div class="area01box">
            <img src="02_Portfolio.png" alt="Portfolio">
            <button class="card-button">My Portfolio</button>
          </div>
          <div class="area03box">
            <p class="MP_conent">
              去感受去體驗去創作，<br>
              這些看似稀鬆平常的生活，<br>
              卻是世界最美好且偉大的作品。
            </p>
          </div>
         </div>

         <!-- 卡片2:Ability -->
         <div class="card-item">
          <div class="area01box">
            <img src="03_Ability.jpg" alt="Ability">
            <button class="card-button">My Ability</button>
          </div>
          <div class="area03box">
            <p class="MA_conent">
               在工作中依照著SOP做好日常規範，<br>
               每一個小螺絲釘都是珍貴的運轉裝置之一，<br>
               在能力範圍內創造更多價值與意義。
            </p>
          </div>
         </div>

         <!-- 卡片3:License -->
         <div class="card-item">
           <div class="area01box">
              <img src="04_lisence.jpg" alt="Lisence">
              <button class="card-button">My License</button>
           </div>

           <div class="area03box">
              <p class="ML_conent">
                 每一個人生步伐，<br>
                 都留下成長的足跡。<br/>
              </p>
           </div>
         </div>

      </section>

    </div>  
  
    
    <!-- 第二區塊：關於我 -->
    <section class="bodyarea02">

      <div class="about-container">
        <div class="area02box">
           <img src="01_PersonalPicture.jpg" alt="PersonalPicture">
           <button class="card-button">About Me</button>
        </div>

        <div class="area04box">
         <p class="AM_conent">
          在每一天看似平凡的日子裡，<br>
          只盼問心無愧的把事做好之餘，<br>
          完成自己的夢想。<br><br/>
          所謂的把事做好...<br>
          除了工作以外，<br>
          還有自己想珍惜的人事物有無悔的珍惜了嗎？<br/>
          每天過上一杯咖啡的小日子，<br>
          是我人生片段裡最放鬆與開心的時光。<br/>
         </p>
        </div>
      </div>

    </section>

   </div>

    
</body>

<script src="00_Script.js"></script>
</html>
